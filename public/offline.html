<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CafeQR Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #475569;
      }
      a {
        display: inline-block;
        margin-top: 18px;
        color: #ea580c;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CafeQR is offline</h1>
      <p>The app shell is available, but this page has not been cached on this device yet. Open the main screens once while online to make them available offline.</p>
      <a href="/owner/orders">Open CafeQR</a>
    </main>
  </body>
</html>
